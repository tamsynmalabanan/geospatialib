{% var request.GET|get:'bbox__bboverlaps' as bbox_filter %}

<button class='border-0 bg-transparent px-0 geospatialibMap-bbox-field' tabindex="-1" type='submit' name='bbox__bboverlaps' title='Seach map extent' onclick="handleSearchQueryField('{{request.GET.query}}')"><i class="bi bi-bounding-box-circles"></i></button>

<button class='border-0 bg-transparent px-0 d-flex align-items-start justify-content-center' tabindex="-1" type='submit' name='bbox__bboverlaps' title='Remove search limit' onclick="handleSearchQueryField('{{request.GET.query}}')" value="" {% if not bbox_filter or bbox_filter == '' %}disabled{% endif %}>
    <i class="bi bi-bounding-box-circles"></i>
    <i class="bi bi-slash-lg position-absolute fs-18"></i>
</button>

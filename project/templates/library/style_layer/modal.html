{% load static %}

{% with id='layerPropertiesModal' %}
    <div class="modal fade" id="{{id}}" tabindex="-1" role="dialog" aria-labelledby="{{id}}Title" aria-hidden="true" >
        <div class="modal-dialog modal-fullscreen-sm-down modal-dialog-scrollable modal-dialog-centered" role="document">
            <form class='modal-content d-flex flex-column'>
                <div class="modal-header border-0">
                    <h5 class="modal-title" id="{{id}}Title">Layer Properties</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" ></button>
                </div>

                <div class="accordion accordion-flush px-0 flex-grow-1 d-flex flex-column" id="styleLayerAccordion">
                    <ul class="nav nav-tabs card-header-tabs ps-3 pt-3">
                        <li class="nav-item">
                            <button
                                class="accordion-button no-icon me-2 px-2 ps-3 py-1 text-bg-dark rounded-top z-3 "
                                type="button"
                                data-bs-toggle="collapse"
                                data-bs-target="#styleLayerPropertiesAccordion"
                                aria-expanded="true"
                                aria-controls="styleLayerPropertiesAccordion"
                            >Layer</button>
                        </li>
                        <li class="nav-item">
                            <button
                                class="accordion-button no-icon me-2 px-2 ps-3 py-1 text-bg-dark rounded-top z-3 collapsed"
                                type="button"
                                data-bs-toggle="collapse"
                                data-bs-target="#legendLayerPropertiesAccordion"
                                aria-expanded="false"
                                aria-controls="legendLayerPropertiesAccordion"
                            >Legend</button>
                        </li>
                    </ul>
                
                    <div class="modal-body p-0 border-top text-bg-dark z-2 flex-grow-1 d-flex flex-column" style='margin-top:-1px;'>
                        <div
                            id="styleLayerPropertiesAccordion"
                            class="accordion-collapse collapse flex-grow-1 fade show"
                            {% comment %} class="accordion-collapse collapse flex-grow-1 fade" {% endcomment %}
                            data-bs-parent="#styleLayerAccordion"
                        >
                            <div class="accordion-body h-100 pt-4">
                                layer - categorize, transparency -- update legend
                            </div>
                        </div>
                        <div
                            id="legendLayerPropertiesAccordion"
                            class="accordion-collapse collapse flex-grow-1 fade"
                            data-bs-parent="#styleLayerAccordion"
                        >
                            <div class="accordion-body h-100 pt-4">
                                legend - label, data source, white background
                            </div>
                        </div>
                    </div>
                </div>                
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary">Save changes</button>
                </div>
            </form>
        </div>
    </div>
{% endwith %}
